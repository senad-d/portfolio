    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(140 80) rotate(60) scale(420 300)">
      <stop stop-color="#22D3EE" stop-opacity="0.28" />
