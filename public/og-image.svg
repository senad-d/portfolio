<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Senad | DevOps Portfolio</title>
  <desc id="desc">AWS-certified DevOps engineer portfolio focused on secure automation, delivery reliability, and measurable cloud outcomes.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816" />
