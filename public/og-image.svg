    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 60) rotate(130) scale(520 420)">
      <stop stop-color="#8B5CF6" stop-opacity="0.42" />
